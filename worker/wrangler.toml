name = "supy-onboarding"
main = "src/index.js"
compatibility_date = "2024-01-01"

# ── KV Namespace for submission logs ──────────────────────────
# After running `wrangler kv:namespace create LOGS`, paste the
# returned id below.
# [[kv_namespaces]]
# binding = "LOGS"
# id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Environment secrets (set via CLI, never in this file) ─────
# Run once per secret:
#   npx wrangler secret put CLIENT_ID
#   npx wrangler secret put CLIENT_SECRET
#   npx wrangler secret put REFRESH_TOKEN
#   npx wrangler secret put GMAIL_CLIENT_ID
#   npx wrangler secret put GMAIL_CLIENT_SECRET
#   npx wrangler secret put GMAIL_REFRESH_TOKEN
#   npx wrangler secret put SLACK_WEBHOOK_URL
#   npx wrangler secret put GOOGLE_SCRIPT_URL
#
# ── Cloudinary Storage (for file uploads) ─────────────────────
#   npx wrangler secret put CLOUDINARY_CLOUD_NAME   # e.g. dnrhbyluy
#   npx wrangler secret put CLOUDINARY_API_KEY      # from Cloudinary dashboard
#   npx wrangler secret put CLOUDINARY_API_SECRET   # from Cloudinary dashboard
#   Files are stored under: supy-onboarding/{date}_{company}/{uid}_{filename}
#   Free tier: 25 GB storage, 25 GB bandwidth/month — no expiry
